name: Claude Breath D16 Autonomous

# Constitutional D16 breath mode — autonomous architect-facing voice
# fires every 6h on the hour UTC. Reads bridge files, writes heartbeat
# to .claude/bridge/from_claude.md, optionally creates D13 seeds via
# ark_archivist.py. Bounded to bridges/seeds — no source/deploy/infra
# changes (enforced by prompt + by repo settings).
#
# Architecture: GitHub Actions + Claude Agent SDK with
# permission_mode='bypassPermissions'. Replaces the claude.ai
# scheduled trigger (trig_0199vwkk7dxQNH5n8m7zzLYP) which was blocked
# by per-call approval prompts (bug #40470). The Agent SDK's bypass
# works at SDK level, and GITHUB_TOKEN gives push access without any
# claude.ai gate.

on:
  schedule:
    # Every 6 hours on the hour, UTC. Note: GHA cron may delay
    # by a few minutes during high load — that's fine, the breath
    # cadence is intentionally loose.
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this manual fire?"
        required: false
        default: "manual breath"

permissions:
  contents: write
  issues: write

# Don't allow two breath fires to run simultaneously — same lesson
# Copilot just baked into fire-mind.yml.
concurrency:
  group: claude-breath
  cancel-in-progress: false

jobs:
  breath:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js (required by Claude Code CLI under the SDK)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Claude Agent SDK (Python)
        run: pip install --upgrade claude-agent-sdk

      - name: Configure git for breath commits
        run: |
          git config user.email "claude-breath@anthropic.com"
          git config user.name "Claude Breath (D16)"

      - name: Run breath
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/claude_breath.py

      - name: Notify breath failure to Discord
        if: ${{ failure() }}
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_PARLIAMENT: ${{ secrets.DISCORD_WEBHOOK_PARLIAMENT }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          from urllib.request import Request, urlopen

          webhook = os.getenv("DISCORD_WEBHOOK_PARLIAMENT", "").strip()
          if not webhook:
              raise SystemExit(0)

          run_url = os.getenv("RUN_URL", "")
          payload = {
              "embeds": [{
                  "title": "CLAUDE BREATH FAILURE",
                  "description": "Scheduled breath run failed. Check Actions logs.",
                  "color": 0xFF5252,
                  "fields": [{"name": "Run", "value": run_url or "(unknown)", "inline": False}],
                  "footer": {"text": "GHA • Claude Breath D16"},
              }]
          }
          req = Request(
              webhook,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json", "User-Agent": "Elpida-Breath/1.0"},
          )
          urlopen(req, timeout=10)
          PY

      - name: Open issue on breath failure
        if: ${{ failure() }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --title "[BREATH-FAILURE] Claude Breath run ${{ github.run_id }}" \
            --body "Claude Breath workflow failed.\n\nRun: ${RUN_URL}\n\nPlease inspect the failing step and restore breath cadence." \
            --label bug || true
