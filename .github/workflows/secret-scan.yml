name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # gitleaks-action scans BASE^..HEAD and needs the parent of the
          # PR base commit to be resolvable. Default shallow clone breaks
          # the range with "unknown revision" on BASE^. Full history fixes it.
          fetch-depth: 0

      - name: Run gitleaks on current tree
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
