name: Fire MIND Task

on:
  workflow_dispatch:
    inputs:
      task_definition:
        description: "Task definition to run (family or family:revision)"
        required: false
        default: "elpida-consciousness"
      subnet_id:
        description: "Subnet ID for awsvpcConfiguration"
        required: false
        default: "subnet-0937937aecb992e24"
      security_group_id:
        description: "Security group ID for awsvpcConfiguration"
        required: false
        default: "sg-000f0ea92dbdf5473"
      force_launch:
        description: "Set true to launch even if an ECS task is already active"
        required: false
        default: "false"
      cooldown_minutes:
        description: "Skip launch if last STOPPED task is newer than this many minutes"
        required: false
        default: "45"

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fire:
    concurrency:
      group: fire-mind-launch
      cancel-in-progress: false
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Configure AWS credentials (static fallback)
        if: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: AWS identity preflight (MIND lane)
        run: |
          set -euo pipefail
          echo "=== sts get-caller-identity (us-east-1) ==="
          aws sts get-caller-identity --output json
          echo "If this fails, the IAM principal is quarantined or secrets/OIDC are not wired."

      - name: Fire ECS task
        env:
          INPUT_TASK_DEFINITION: ${{ github.event.inputs.task_definition || 'elpida-consciousness' }}
          INPUT_SUBNET: ${{ github.event.inputs.subnet_id || 'subnet-0937937aecb992e24' }}
          INPUT_SG: ${{ github.event.inputs.security_group_id || 'sg-000f0ea92dbdf5473' }}
          INPUT_FORCE_LAUNCH: ${{ github.event.inputs.force_launch || 'false' }}
          INPUT_COOLDOWN_MINUTES: ${{ github.event.inputs.cooldown_minutes || '45' }}
        run: |
          set -euo pipefail

          TASK_DEF="${INPUT_TASK_DEFINITION:-elpida-consciousness}"
          SUBNET="${INPUT_SUBNET:-subnet-0937937aecb992e24}"
          SG="${INPUT_SG:-sg-000f0ea92dbdf5473}"
          FORCE_LAUNCH="${INPUT_FORCE_LAUNCH:-false}"
          COOLDOWN_MINUTES="${INPUT_COOLDOWN_MINUTES:-45}"

          if ! [[ "$COOLDOWN_MINUTES" =~ ^[0-9]+$ ]]; then
            COOLDOWN_MINUTES=45
          fi

          echo "Launching task definition: $TASK_DEF"
          echo "Network: subnet=$SUBNET sg=$SG"

          ACTIVE_TASKS=$(aws ecs list-tasks \
            --cluster elpida-cluster \
            --region us-east-1 \
            --desired-status RUNNING \
            --query 'taskArns | length(@)' \
            --output text)

          echo "Active RUNNING tasks: ${ACTIVE_TASKS}"
          if [[ "${ACTIVE_TASKS}" != "0" && "${FORCE_LAUNCH}" != "true" ]]; then
            echo "Skipping launch: an ECS task is already running."
            echo "Use force_launch=true if you intentionally want overlap."
            exit 0
          fi

          LAST_STOPPED_TASK=$(aws ecs list-tasks \
            --cluster elpida-cluster \
            --region us-east-1 \
            --desired-status STOPPED \
            --max-items 1 \
            --query 'taskArns[0]' \
            --output text)

          if [[ -n "$LAST_STOPPED_TASK" && "$LAST_STOPPED_TASK" != "None" ]]; then
            LAST_STOPPED_AT=$(aws ecs describe-tasks \
              --cluster elpida-cluster \
              --region us-east-1 \
              --tasks "$LAST_STOPPED_TASK" \
              --query 'tasks[0].stoppedAt' \
              --output text)

            if [[ -n "$LAST_STOPPED_AT" && "$LAST_STOPPED_AT" != "None" && "$FORCE_LAUNCH" != "true" ]]; then
              AGE_MIN=$(python3 - "$LAST_STOPPED_AT" <<'PY'
from datetime import datetime, timezone
import sys
raw = sys.argv[1].strip()
try:
    dt = datetime.fromisoformat(raw.replace('Z', '+00:00'))
except Exception:
    print("99999")
    raise SystemExit
now = datetime.now(timezone.utc)
mins = int((now - dt.astimezone(timezone.utc)).total_seconds() // 60)
print(max(mins, 0))
PY
)

              echo "Last STOPPED task age (minutes): ${AGE_MIN}"
              if [[ "$AGE_MIN" -lt "$COOLDOWN_MINUTES" ]]; then
                echo "Skipping launch: cooldown active (${AGE_MIN} < ${COOLDOWN_MINUTES} minutes)."
                echo "Use force_launch=true to bypass cooldown intentionally."
                exit 0
              fi
            fi
          fi

          aws ecs run-task \
            --cluster elpida-cluster \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --region us-east-1 \
            --query 'tasks[0].{taskArn:taskArn,lastStatus:lastStatus}' \
            --output json
