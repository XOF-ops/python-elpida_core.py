name: Fire MIND Task

on:
  workflow_dispatch:

jobs:
  fire:
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - name: Fire ECS task
        env:
          RAW_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          RAW_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          export AWS_ACCESS_KEY_ID=$(echo "$RAW_KEY_ID" | tr -d '[:space:]')
          export AWS_SECRET_ACCESS_KEY=$(echo "$RAW_SECRET" | tr -d '[:space:]')
          aws ecs run-task \
            --cluster elpida-cluster \
            --task-definition elpida-consciousness:21 \
            --launch-type FARGATE \
            --network-configuration 'awsvpcConfiguration={subnets=[subnet-0937937aecb992e24],securityGroups=[sg-000f0ea92dbdf5473],assignPublicIp=ENABLED}' \
            --region us-east-1 \
            --query 'tasks[0].{taskArn:taskArn,lastStatus:lastStatus}' \
            --output json
