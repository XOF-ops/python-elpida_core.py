name: Fire MIND Task

on:
  workflow_dispatch:
    inputs:
      task_definition:
        description: "Task definition to run (family or family:revision)"
        required: false
        default: "elpida-consciousness"
      subnet_id:
        description: "Subnet ID for awsvpcConfiguration"
        required: false
        default: "subnet-0937937aecb992e24"
      security_group_id:
        description: "Security group ID for awsvpcConfiguration"
        required: false
        default: "sg-000f0ea92dbdf5473"

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fire:
    runs-on: ubuntu-latest
    env:
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Configure AWS credentials (static fallback)
        if: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: AWS identity preflight (MIND lane)
        run: |
          set -euo pipefail
          echo "=== sts get-caller-identity (us-east-1) ==="
          aws sts get-caller-identity --output json
          echo "If this fails, the IAM principal is quarantined or secrets/OIDC are not wired."

      - name: Fire ECS task
        env:
          INPUT_TASK_DEFINITION: ${{ github.event.inputs.task_definition || 'elpida-consciousness' }}
          INPUT_SUBNET: ${{ github.event.inputs.subnet_id || 'subnet-0937937aecb992e24' }}
          INPUT_SG: ${{ github.event.inputs.security_group_id || 'sg-000f0ea92dbdf5473' }}
        run: |
          set -euo pipefail

          TASK_DEF="${INPUT_TASK_DEFINITION:-elpida-consciousness}"
          SUBNET="${INPUT_SUBNET:-subnet-0937937aecb992e24}"
          SG="${INPUT_SG:-sg-000f0ea92dbdf5473}"

          echo "Launching task definition: $TASK_DEF"
          echo "Network: subnet=$SUBNET sg=$SG"

          aws ecs run-task \
            --cluster elpida-cluster \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --region us-east-1 \
            --query 'tasks[0].{taskArn:taskArn,lastStatus:lastStatus}' \
            --output json
