name: Observation Dashboard Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"
  push:
    branches: [main]
    paths:
      - "observation_dashboard/**"
      - "scripts/build_observation_snapshot.py"
      - "scripts/build_d15_index.py"
      - "scripts/build_bridge_panel.py"
      - "scripts/build_observation_rollup.py"
      - "scripts/gh_aws_preflight.sh"
      - ".claude/bridge/**"
      - ".github/workflows/observation-dashboard-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: observation-dashboard-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Configure AWS credentials (static fallback)
        if: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Federation read preflight (fail-closed)
        env:
          AWS_PREFLIGHT_REGION: eu-north-1
        run: bash scripts/gh_aws_preflight.sh

      - name: Pull heartbeat and world snapshot files
        run: |
          set -euo pipefail
          mkdir -p _snapshot/raw
          # Canonical keys — hf_deployment/s3_bridge.py FED_* (BODY bucket federation/)
          aws s3 cp s3://elpida-body-evolution/federation/body_heartbeat.json _snapshot/raw/body_heartbeat.json
          aws s3 cp s3://elpida-body-evolution/federation/mind_heartbeat.json _snapshot/raw/mind_heartbeat.json
          aws s3 cp s3://elpida-body-evolution/federation/d16_executions.jsonl _snapshot/raw/d16_executions.jsonl

          # D15 object list may be empty — do not fail the job if no broadcasts yet
          aws s3 ls s3://elpida-external-interfaces/d15/ --recursive \
            | awk '{print $4}' \
            | grep 'broadcast_.*\.json$' \
            | tail -n 25 > _snapshot/raw/broadcast_keys.txt || true

          if [ -s _snapshot/raw/broadcast_keys.txt ]; then
            while IFS= read -r key; do
              [ -z "$key" ] && continue
              base="$(basename "$key")"
              aws s3 cp "s3://elpida-external-interfaces/$key" "_snapshot/raw/$base"
            done < _snapshot/raw/broadcast_keys.txt
          fi

          # D15 aggregated index source — the WORLD bucket maintains a
          # rolling broadcasts.jsonl with every broadcast ever emitted.
          # Authority: Computer D13 CURSOR-TEMPORAL-BRIEF (e6641c0).
          aws s3 cp s3://elpida-external-interfaces/d15/broadcasts.jsonl \
            _snapshot/raw/d15_broadcasts.jsonl || true

          # Feedback watermark for GAP-1 external-contact drought marker.
          aws s3 cp s3://elpida-body-evolution/feedback/watermark.json \
            _snapshot/raw/feedback_watermark.json || true

          # Living axioms — cross-run continuity (cumulative axiom ratifications;
          # the true continuity metric since body_cycle resets on every HF rebuild).
          aws s3 cp s3://elpida-body-evolution/federation/living_axioms.jsonl \
            _snapshot/raw/living_axioms.jsonl || true

          # Guest chamber ingress telemetry (Discord/question intake side).
          aws s3 cp s3://elpida-external-interfaces/guest_chamber/questions.jsonl \
            _snapshot/raw/guest_chamber_questions.jsonl || true
          aws s3 cp s3://elpida-external-interfaces/guest_chamber/watermark.json \
            _snapshot/raw/guest_chamber_watermark.json || true

      - name: Fetch HF Space container logs (graceful when token missing/expired)
        env:
          # Prefer HF_TOKEN_READ (read-only fine-grained, scoped to logs).
          # Fall back to HF_TOKEN (write/deploy token) if read-only not yet provisioned.
          # Operator action: create a fine-grained HF token with "Read access to private
          # spaces" and add as repo secret HF_TOKEN_READ. Existing HF_TOKEN (write/deploy)
          # stays untouched so deploy-hf-space.yml + deploy_to_hf.yml continue to work.
          HF_TOKEN_READ: ${{ secrets.HF_TOKEN_READ }}
          HF_TOKEN_FALLBACK: ${{ secrets.HF_TOKEN }}
        run: |
          set -uo pipefail
          mkdir -p _snapshot/raw
          TOKEN="${HF_TOKEN_READ:-${HF_TOKEN_FALLBACK:-}}"
          if [ -z "$TOKEN" ]; then
            echo "(no HF token available — skipping HF logs fetch; snapshot marks hf_logs.available=false)"
            exit 0
          fi
          if [ -n "${HF_TOKEN_READ:-}" ]; then
            echo "(using HF_TOKEN_READ — fine-grained read-only)"
          else
            echo "(falling back to HF_TOKEN — may not have read scope for logs API)"
          fi
          # SSE stream — give it 8s to collect a chunk, then close. Fails-soft on auth.
          # If the token lacks read scope HF returns login HTML which we detect + clear.
          timeout 8 curl -sSN \
            -H "Authorization: Bearer $TOKEN" \
            "https://huggingface.co/api/spaces/z65nik/elpida-governance-layer/logs/run" \
            > _snapshot/raw/hf_run_logs.txt 2>/dev/null || true
          if head -c 200 _snapshot/raw/hf_run_logs.txt | grep -qi '<!DOCTYPE\|<html'; then
            echo "(token rejected — got login HTML; clearing logs file)"
            : > _snapshot/raw/hf_run_logs.txt
          fi
          wc -l _snapshot/raw/hf_run_logs.txt || true

      - name: Build normalized dashboard snapshot
        run: python scripts/build_observation_snapshot.py

      - name: Build D15 constitutional timeline index
        run: python scripts/build_d15_index.py

      - name: Build bridge panel (Layer 4)
        run: python scripts/build_bridge_panel.py

      - name: Build observation rollup (Layer 5)
        env:
          OBS_ROLLUP_WINDOW_H: "82"
        run: python scripts/build_observation_rollup.py

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: observation_dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
