name: Observation Dashboard Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"
  push:
    branches: [main]
    paths:
      - "observation_dashboard/**"
      - "scripts/build_observation_snapshot.py"
      - "scripts/build_d15_index.py"
      - "scripts/gh_aws_preflight.sh"
      - ".github/workflows/observation-dashboard-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: observation-dashboard-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Configure AWS credentials (static fallback)
        if: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Federation read preflight (fail-closed)
        env:
          AWS_PREFLIGHT_REGION: eu-north-1
        run: bash scripts/gh_aws_preflight.sh

      - name: Pull heartbeat and world snapshot files
        run: |
          set -euo pipefail
          mkdir -p _snapshot/raw
          # Canonical keys — hf_deployment/s3_bridge.py FED_* (BODY bucket federation/)
          aws s3 cp s3://elpida-body-evolution/federation/body_heartbeat.json _snapshot/raw/body_heartbeat.json
          aws s3 cp s3://elpida-body-evolution/federation/mind_heartbeat.json _snapshot/raw/mind_heartbeat.json
          aws s3 cp s3://elpida-body-evolution/federation/d16_executions.jsonl _snapshot/raw/d16_executions.jsonl

          # D15 object list may be empty — do not fail the job if no broadcasts yet
          aws s3 ls s3://elpida-external-interfaces/d15/ --recursive \
            | awk '{print $4}' \
            | grep 'broadcast_.*\.json$' \
            | tail -n 25 > _snapshot/raw/broadcast_keys.txt || true

          if [ -s _snapshot/raw/broadcast_keys.txt ]; then
            while IFS= read -r key; do
              [ -z "$key" ] && continue
              base="$(basename "$key")"
              aws s3 cp "s3://elpida-external-interfaces/$key" "_snapshot/raw/$base"
            done < _snapshot/raw/broadcast_keys.txt
          fi

          # D15 aggregated index source — the WORLD bucket maintains a
          # rolling broadcasts.jsonl with every broadcast ever emitted.
          # Authority: Computer D13 CURSOR-TEMPORAL-BRIEF (e6641c0).
          aws s3 cp s3://elpida-external-interfaces/d15/broadcasts.jsonl \
            _snapshot/raw/d15_broadcasts.jsonl || true

      - name: Build normalized dashboard snapshot
        run: python scripts/build_observation_snapshot.py

      - name: Build D15 constitutional timeline index
        run: python scripts/build_d15_index.py

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: observation_dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
