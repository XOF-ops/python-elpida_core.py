name: HERMES Phase 3 — Telegram Routing

# HERMES (Fleet THE_INTERFACE) inbound: architect → Telegram command →
# HERMES parses intent → executes (create Issue, write to bridge, fire
# workflow) → posts ack to Telegram → archives to .claude/bridge/from_hermes.md.
#
# The architect's exit from architect-as-protocol, completed.
# Phase 2 (daily synthesis outbound) handles routine awareness.
# Phase 3 (this file) handles directed action via two-way conversation.
#
# Migrated from Discord 2026-04-30. Architect now posts in
# Control Room → 🎯 Commands topic; any non-empty message is treated
# as a command. Optional /hermes or !hermes prefixes are tolerated.

on:
  # Default: poll every 5 minutes for new Telegram commands
  schedule:
    - cron: '*/5 * * * *'

  # Manual dispatch:
  #   - Leave `command` BLANK to force a Telegram polling run (use this to
  #     pick up queued messages without waiting for the cron to register,
  #     e.g. just after first deploy).
  #   - Provide a `command` to skip Telegram and process that text directly
  #     as if it had arrived via Telegram (useful for testing without
  #     posting in the topic).
  workflow_dispatch:
    inputs:
      command:
        description: "Command text (LEAVE BLANK to poll Telegram topic; fill in to skip Telegram and process this text directly)"
        required: false
        default: ""
      author:
        description: "Author name (only used if command is filled in)"
        required: false
        default: "architect"

permissions:
  id-token: write   # OIDC role assumption for AWS (S3 read only)
  contents: write
  issues: write
  actions: write  # so HERMES can fire other workflows via gh workflow run

# Don't allow two HERMES route fires to overlap. Polling cadence is short
# enough that overlap would mean we're falling behind.
concurrency:
  group: hermes-route
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  route:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js (Claude Code CLI under SDK)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install Claude Agent SDK
        run: pip install --upgrade claude-agent-sdk

      # AWS credentials for S3 reads — lets HERMES verify state when the
      # architect's command requires it (e.g., "check S3 for X" or
      # "verify Gap 2 is operational"). Same OIDC pattern as deploy-mind-ecr.
      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (static fallback)
        if: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure git for HERMES routing commits
        run: |
          git config user.email "hermes@elpida.anthropic.com"
          git config user.name "Hermes (Fleet THE_INTERFACE)"

      - name: Run HERMES routing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # gh CLI reads GH_TOKEN
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CONTROL_ROOM_ID: ${{ secrets.TELEGRAM_CONTROL_ROOM_ID }}
          TELEGRAM_TOPIC_COMMANDS: ${{ secrets.TELEGRAM_TOPIC_COMMANDS }}
          # workflow_dispatch path: pass the input as env so the script
          # can detect manual mode and skip Telegram polling
          HERMES_MANUAL_COMMAND: ${{ github.event.inputs.command }}
          HERMES_MANUAL_AUTHOR: ${{ github.event.inputs.author }}
        run: python scripts/hermes_route.py

      - name: Commit + push if anything changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "[HERMES-ROUTED] Phase 3 routing artifact $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin main || echo "(push failed; bridge writes still on disk for next attempt)"
          else
            echo "(no changes to commit)"
          fi
