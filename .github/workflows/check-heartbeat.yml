name: Check MIND Heartbeat

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        if: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Configure AWS credentials (static fallback)
        if: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN == '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Read heartbeat
        run: |
          set -euo pipefail

          echo "=== AWS Caller Identity ==="
          aws sts get-caller-identity --output json

          export AWS_DEFAULT_REGION=eu-north-1
          echo "=== MIND Heartbeat ==="
          aws s3api head-object --bucket elpida-body-evolution --key federation/mind_heartbeat.json >/dev/null
          aws s3 cp s3://elpida-body-evolution/federation/mind_heartbeat.json /tmp/mind_heartbeat.json
          python3 -m json.tool /tmp/mind_heartbeat.json
          echo ""
          echo "=== ECS Tasks ==="
          export AWS_DEFAULT_REGION=us-east-1
          aws ecs list-tasks --cluster elpida-cluster --output json
          echo ""
          echo "=== D16 Executions (tail) ==="
          export AWS_DEFAULT_REGION=eu-north-1
          aws s3api head-object --bucket elpida-body-evolution --key federation/d16_executions.jsonl >/dev/null
          aws s3 cp s3://elpida-body-evolution/federation/d16_executions.jsonl - | tail -3
