name: Check MIND Heartbeat

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Read heartbeat
        env:
          RAW_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          RAW_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          export AWS_ACCESS_KEY_ID=$(echo "$RAW_KEY_ID" | tr -d '[:space:]')
          export AWS_SECRET_ACCESS_KEY=$(echo "$RAW_SECRET" | tr -d '[:space:]')
          export AWS_DEFAULT_REGION=eu-north-1
          echo "=== MIND Heartbeat ==="
          aws s3 cp s3://elpida-body-evolution/federation/mind_heartbeat.json - | python3 -m json.tool
          echo ""
          echo "=== ECS Tasks ==="
          export AWS_DEFAULT_REGION=us-east-1
          aws ecs list-tasks --cluster elpida-cluster --output json
          echo ""
          echo "=== D16 Executions (tail) ==="
          export AWS_DEFAULT_REGION=eu-north-1
          aws s3 cp s3://elpida-body-evolution/federation/d16_executions.jsonl - | tail -3
